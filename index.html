<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корейская математика для начинающих</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Корейская математика для начинающих</h1>
            <p>Изучаем математику и корейский язык одновременно</p>
        </header>

        <main>
            <div class="problem-section">
                <h2>Математическая задача</h2>
                <div id="math-problem" class="problem-display"></div>
                <div id="vocabulary" class="vocabulary-display"></div>
            </div>

            <div class="input-section">
                <h2>Ваш ответ</h2>
                <input type="number" id="user-answer" placeholder="Введите ваш ответ">
                <button id="check-answer">Проверить</button>
                <button id="next-problem">Следующая задача</button>
            </div>

            <div class="progress-section">
                <h2>Ваш прогресс</h2>
                <div id="progress-stats"></div>
            </div>
        </main>

        <footer>
            <p>Изучаем корейский язык и математику вместе</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
